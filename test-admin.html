<!DOCTYPE html>
<html>
<head>
    <title>Admin Registration Test</title>
</head>
<body>
    <h1>Admin Registration Test</h1>
    <button onclick="testHealth()">Test Server Health</button>
    <button onclick="registerAdmin()">Register Admin</button>
    <button onclick="testLogin()">Test Admin Login</button>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');
        
        function log(message) {
            output.innerHTML += `<p>${message}</p>`;
            console.log(message);
        }
        
        async function testHealth() {
            try {
                const response = await fetch('http://localhost:5000/health');
                const data = await response.json();
                log('✅ Server Health: ' + JSON.stringify(data));
            } catch (error) {
                log('❌ Health Check Error: ' + error.message);
            }
        }
        
        async function registerAdmin() {
            try {
                log('Attempting to register admin...');
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: 'Admin User',
                        email: 'admin@bidcraft.com',
                        password: 'Admin123',
                        role: 'admin'
                    })
                });
                
                const data = await response.text();
                log(`Registration Status: ${response.status}`);
                log(`Registration Response: ${data}`);
                
            } catch (error) {
                log('❌ Registration Error: ' + error.message);
            }
        }
        
        async function testLogin() {
            try {
                log('Attempting admin login...');
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@bidcraft.com',
                        password: 'Admin123'
                    })
                });
                
                const data = await response.text();
                log(`Login Status: ${response.status}`);
                log(`Login Response: ${data}`);
                
            } catch (error) {
                log('❌ Login Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
